<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Cast Mirror Receiver</title>
  <script src="https://www.gstatic.com/cast/sdk/libs/caf_receiver/v3/cast_receiver_framework.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #waiting { text-align: center; padding: 2rem; }
    #waiting h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #58a6ff; }
    #waiting p { color: #8b949e; font-size: 1.25rem; }
    #video-container {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
      position: fixed;
      inset: 0;
    }
    #web-container {
      display: none;
      width: 100vw;
      height: 100vh;
      background: #000;
      position: fixed;
      inset: 0;
      z-index: 3;
    }
    #web-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: #000;
    }
    #web-image {
      display: none;
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }
    #web-status {
      position: fixed;
      left: 0;
      right: 0;
      top: 1rem;
      text-align: center;
      color: #8b949e;
      font-size: 1rem;
      z-index: 4;
      pointer-events: none;
    }
    #video-status {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 1.5rem;
      text-align: center;
      color: #8b949e;
      font-size: 1rem;
      z-index: 2;
      pointer-events: none;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    #status { margin-top: 1rem; color: #8b949e; }
  </style>
</head>
<body>
  <div id="waiting">
    <h1>TV Cast Mirror</h1>
    <p>Ready to mirror your iPhone screen</p>
    <p id="status">Open the app and connect to this TV…</p>
  </div>
  <div id="video-container">
    <video id="remote-video" autoplay playsinline muted></video>
    <p id="video-status"></p>
  </div>
  <div id="web-container">
    <iframe
      id="web-frame"
      title="Cast web page"
      allow="autoplay; fullscreen; encrypted-media; picture-in-picture"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin"
    ></iframe>
    <img id="web-image" alt="Cast page snapshot" />
    <p id="web-status"></p>
  </div>

  <script>
    const CUSTOM_CHANNEL = 'urn:x-cast:com.tvmirror.signaling';
    const STUN = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    let sessionId = null;
    let signalingHost = null;
    let signalingPort = null;
    let peerConnection = null;
    let icePollTimer = null;
    let sessionRequestTimer = null;
    let webRtcStartInProgress = false;
    let webRtcStarted = false;
    let blackScreenWatchdog = null;

    const context = cast.framework.CastReceiverContext.getInstance();
    const remoteVideo = document.getElementById('remote-video');
    const videoStatus = document.getElementById('video-status');
    const webFrame = document.getElementById('web-frame');
    const webImage = document.getElementById('web-image');
    const webStatus = document.getElementById('web-status');
    let webPageActive = false;

    function showWaiting() {
      document.getElementById('waiting').style.display = 'block';
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('web-container').style.display = 'none';
    }

    function showVideo() {
      if (webPageActive) return;
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('web-container').style.display = 'none';
      document.getElementById('video-container').style.display = 'block';
    }

    function showWebPage() {
      document.getElementById('waiting').style.display = 'none';
      document.getElementById('video-container').style.display = 'none';
      document.getElementById('web-container').style.display = 'block';
    }

    function isImageURL(url) {
      try {
        const u = new URL(url);
        if (u.pathname.indexOf('/media') !== -1) return true;
        return /\.(jpe?g|png|gif|webp)$/i.test(u.pathname);
      } catch (e) {
        return false;
      }
    }

    function clearWebPage() {
      webPageActive = false;
      webFrame.removeAttribute('src');
      webImage.removeAttribute('src');
      webFrame.style.display = 'block';
      webImage.style.display = 'none';
      webStatus.textContent = '';
      if (peerConnection && remoteVideo.srcObject) {
        showVideo();
      } else {
        showWaiting();
        if (sessionId) {
          setStatus('Waiting for iPhone screen broadcast…');
        } else {
          setStatus('Open the app and connect to this TV…');
        }
      }
    }

    function loadWebPage(url, title) {
      if (!url || typeof url !== 'string') return;
      // Pause mirror WebRTC so the web surface is active.
      stopSessionPrepareRequests();
      resetWebRtc({ keepSession: true });
      webPageActive = true;
      showWebPage();
      webStatus.textContent = title ? `Loading ${title}…` : 'Loading page…';
      setStatus(title ? `Showing ${title}` : 'Showing web page');

      const showLoaded = () => {
        webStatus.textContent = title || '';
      };
      const showFailed = () => {
        webStatus.textContent = 'This page could not be displayed on TV';
        setStatus('Page blocked embedding — try another site or YouTube video');
      };

      if (isImageURL(url)) {
        // Browser cast sends a JPEG snapshot (Google and many sites block iframes).
        webFrame.style.display = 'none';
        webFrame.removeAttribute('src');
        webImage.style.display = 'block';
        webImage.onload = showLoaded;
        webImage.onerror = showFailed;
        webImage.src = url;
      } else {
        webImage.style.display = 'none';
        webImage.removeAttribute('src');
        webFrame.style.display = 'block';
        webFrame.onload = showLoaded;
        webFrame.onerror = showFailed;
        webFrame.src = url;
      }
      console.log('load_web_url', url, title);
    }

    function resetWebRtc({ keepSession = true } = {}) {
      if (icePollTimer) {
        clearInterval(icePollTimer);
        icePollTimer = null;
      }
      if (blackScreenWatchdog) {
        clearTimeout(blackScreenWatchdog);
        blackScreenWatchdog = null;
      }
      if (peerConnection) {
        peerConnection.close();
        peerConnection = null;
      }
      webRtcStarted = false;
      webRtcStartInProgress = false;
      remoteVideo.srcObject = null;
      document.getElementById('video-container').style.display = 'none';
      videoStatus.textContent = '';
      if (!webPageActive) {
        document.getElementById('waiting').style.display = 'block';
        if (keepSession && sessionId) {
          setStatus('Waiting for iPhone screen broadcast…');
        } else if (!sessionId) {
          setStatus('Open the app and connect to this TV…');
        }
      }
    }

    function shouldRestartWebRtc() {
      if (!peerConnection) return true;
      return ['failed', 'closed', 'disconnected'].includes(peerConnection.connectionState);
    }

    function attachVideoStream(stream) {
      remoteVideo.srcObject = stream;
      remoteVideo.muted = false;

      const revealVideo = () => {
        showVideo();
        setStatus('Connected');
        videoStatus.textContent = 'Live';
        if (blackScreenWatchdog) {
          clearTimeout(blackScreenWatchdog);
          blackScreenWatchdog = null;
        }
      };

      remoteVideo.onplaying = revealVideo;
      remoteVideo.onloadeddata = () => {
        if (remoteVideo.videoWidth > 0) revealVideo();
      };

      blackScreenWatchdog = setTimeout(() => {
        if (!remoteVideo.videoWidth) {
          console.warn('Black screen watchdog — retrying WebRTC');
          videoStatus.textContent = 'Retrying connection…';
          resetWebRtc();
          void startWebRtc();
        }
      }, 10_000);
    }

    function applySessionPrepare(data) {
      if (!data || !data.sessionId || !data.signalingHost || !data.signalingPort) return false;

      const sameSession =
        sessionId === data.sessionId &&
        signalingHost === data.signalingHost &&
        signalingPort === data.signalingPort;
      if (sameSession) {
        if (shouldRestartWebRtc()) {
          resetWebRtc();
          void startWebRtc();
        }
        return true;
      }

      resetWebRtc({ keepSession: false });

      sessionId = data.sessionId;
      signalingHost = data.signalingHost;
      signalingPort = data.signalingPort;
      setStatus('iPhone ready — start screen broadcast on iPhone');
      console.log('session_prepare applied', sessionId, signalingHost, signalingPort);
      stopSessionPrepareRequests();

      void startWebRtc();
      return true;
    }

    context.addCustomMessageListener(CUSTOM_CHANNEL, (event) => {
      try {
        const data = typeof event.data === 'string' ? JSON.parse(event.data) : event.data;
        if (data.type === 'session_prepare') {
          // Do not tear down an active web/YouTube cast for mirror prepare pings.
          if (webPageActive) {
            console.log('ignoring session_prepare during web cast');
            return;
          }
          applySessionPrepare(data);
        } else if (data.type === 'load_web_url') {
          loadWebPage(data.mediaURL, data.title);
        } else if (data.type === 'clear_web_url') {
          clearWebPage();
        }
      } catch (e) {
        console.error('Invalid cast message', e);
      }
    });

    function setStatus(text) {
      document.getElementById('status').textContent = text;
    }

    function sleep(ms) {
      return new Promise((resolve) => setTimeout(resolve, ms));
    }

    function signalingUrl(path) {
      return `http://${signalingHost}:${signalingPort}${path}`;
    }

    async function postJson(path, body, query = '') {
      return fetch(signalingUrl(path + query), {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
    }

    async function getJson(path) {
      const res = await fetch(signalingUrl(path));
      if (res.status === 204) return null;
      if (!res.ok) return null;
      return res.json();
    }

    function sendCastMessage(payload) {
      context.sendCustomMessage(CUSTOM_CHANNEL, payload);
    }

    function requestSessionPrepare() {
      sendCastMessage({ type: 'request_session_prepare' });
    }

    function startSessionPrepareRequests() {
      stopSessionPrepareRequests();
      requestSessionPrepare();
      sessionRequestTimer = setInterval(() => {
        if (!sessionId) requestSessionPrepare();
      }, 1500);
    }

    function stopSessionPrepareRequests() {
      if (sessionRequestTimer) {
        clearInterval(sessionRequestTimer);
        sessionRequestTimer = null;
      }
    }

    async function waitForOffer() {
      for (let i = 0; i < 120; i++) {
        const msg = await getJson(`/sdp/offer?sessionId=${encodeURIComponent(sessionId)}`);
        if (msg && msg.type === 'offer' && msg.sdp) return msg.sdp;
        await sleep(500);
      }
      throw new Error('Offer timeout');
    }

    async function startIcePolling() {
      if (icePollTimer) clearInterval(icePollTimer);
      icePollTimer = setInterval(async () => {
        try {
          const list = await getJson(`/ice?sessionId=${encodeURIComponent(sessionId)}&side=sender`);
          if (!list || !list.candidates) return;
          for (const c of list.candidates) {
            await peerConnection.addIceCandidate({
              candidate: c.candidate,
              sdpMid: c.sdpMid,
              sdpMLineIndex: c.sdpMLineIndex,
            });
          }
        } catch (e) {
          console.warn('ICE poll error', e);
        }
      }, 300);
    }

    async function startWebRtc() {
      if (!sessionId || !signalingHost || !signalingPort) return;
      if (peerConnection || webRtcStartInProgress || webRtcStarted) return;

      webRtcStartInProgress = true;
      setStatus('Waiting for iPhone screen broadcast…');

      try {
        const offerSdp = await waitForOffer();

        peerConnection = new RTCPeerConnection(STUN);
        peerConnection.ontrack = (event) => { 
          if (!event.streams || !event.streams[0]) return;
          attachVideoStream(event.streams[0]);
        };

        peerConnection.onconnectionstatechange = () => {
          const state = peerConnection?.connectionState;
          videoStatus.textContent = state ? `WebRTC: ${state}` : '';
          if (state === 'connected') {
            setStatus('Connected');
          }
          if (state === 'failed' || state === 'disconnected') {
            console.warn('WebRTC state', state, '— retrying');
            resetWebRtc();
            setTimeout(() => {
              if (sessionId && !webRtcStarted && !webRtcStartInProgress) {
                void startWebRtc();
              }
            }, 1500);
          }
        };

        peerConnection.onicecandidate = (event) => {
          if (!event.candidate) return;
          postJson('/ice', {
            sessionId,
            candidate: event.candidate.candidate,
            sdpMid: event.candidate.sdpMid,
            sdpMLineIndex: event.candidate.sdpMLineIndex,
          }, '?side=receiver').catch(console.error);
        };

        await peerConnection.setRemoteDescription({ type: 'offer', sdp: offerSdp });
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);

        await postJson('/sdp', {
          sessionId,
          type: 'answer',
          sdp: answer.sdp,
        });

        startIcePolling();
        webRtcStarted = true;
      } catch (e) {
        console.error('startWebRtc failed', e);
        resetWebRtc();
        setStatus('Waiting for iPhone screen broadcast…');
        setTimeout(() => {
          if (sessionId && !webRtcStarted && !webRtcStartInProgress) {
            void startWebRtc();
          }
        }, 2000);
      } finally {
        webRtcStartInProgress = false;
      }
    }

    context.addEventListener(cast.framework.system.EventType.SENDER_CONNECTED, () => {
      setStatus('Waiting for iPhone connection…');
      startSessionPrepareRequests();
    });

    if (context.getSenders().length > 0) {
      startSessionPrepareRequests();
    }

    context.addEventListener(cast.framework.system.EventType.SENDER_DISCONNECTED, () => {
      if (webPageActive) {
        // Keep showing the web page while sender briefly disconnects.
        return;
      }
      if (peerConnection && remoteVideo.videoWidth > 0) {
        // Main app may background while ReplayKit keeps streaming.
        setStatus('iPhone in background — mirroring continues');
        videoStatus.textContent = 'Live (iPhone backgrounded)';
        return;
      }
      stopSessionPrepareRequests();
      resetWebRtc({ keepSession: false });
      sessionId = null;
      signalingHost = null;
      signalingPort = null;
      setStatus('Open the app and connect to this TV…');
    });

    context.start({
      disableIdleTimeout: true,
      customNamespaces: { [CUSTOM_CHANNEL]: cast.framework.system.MessageType.JSON },
    });
  </script>
</body>
</html>
